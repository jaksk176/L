<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NEON LUXE CASINO</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --neon: #ff00ff;
      --gold: #ffd700;
    }
    * { box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #0a001f;
      color: #eee;
      margin: 0;
      padding: 0;
      min-height: 100vh;
    }
    header {
      background: rgba(10, 0, 31, 0.95);
      backdrop-filter: blur(10px);
      border-bottom: 2px solid var(--neon);
      padding: 15px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .logo { font-size: 1.8em; font-weight: bold; color: var(--neon); text-shadow: 0 0 10px var(--neon); }

    .main-container { display: flex; min-height: calc(100vh - 70px); }
    .sidebar {
      width: 220px;
      background: rgba(26, 0, 51, 0.95);
      padding: 20px 10px;
      border-right: 1px solid #440066;
    }
    .nav-btn {
      width: 100%;
      padding: 16px;
      margin: 8px 0;
      background: transparent;
      border: none;
      color: #ccc;
      text-align: left;
      font-size: 1.1em;
      border-radius: 8px;
      cursor: pointer;
    }
    .nav-btn:hover, .nav-btn.active {
      background: rgba(255, 0, 255, 0.2);
      color: white;
      box-shadow: 0 0 10px var(--neon);
    }

    .content {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .glass {
      background: rgba(26, 0, 51, 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255, 0, 255, 0.3);
      border-radius: 16px;
      padding: 25px;
    }

    .balance-bar {
      background: rgba(0, 255, 100, 0.1);
      padding: 12px 20px;
      border-radius: 12px;
      text-align: center;
      font-size: 1.4em;
      margin-bottom: 20px;
      border: 1px solid #00ff88;
    }

    button {
      background: var(--neon);
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 12px;
      font-weight: bold;
      cursor: pointer;
    }
    button:hover { background: #ff66ff; }

    .promo-banner {
      background: linear-gradient(90deg, #ffd700, #ffaa00);
      color: #000;
      padding: 12px;
      text-align: center;
      font-weight: bold;
      border-radius: 10px;
      margin: 15px 0;
    }

    .crash-chart-container { height: 300px; margin: 20px 0; }
  </style>
</head>
<body>

  <header>
    <div style="display:flex; justify-content:space-between; align-items:center; max-width:1200px; margin:auto;">
      <div class="logo">NEON LUXE CASINO</div>
      <div class="balance-bar">
        Balance: $<span id="balance">10000</span> | <span id="currentUser" style="color:#00ff88;"></span>
        <button onclick="logout()" style="background:#ff4444; padding:6px 12px; font-size:0.9em; margin-left:15px;">Logout</button>
      </div>
    </div>
  </header>

  <div class="main-container">
    <!-- Sidebar -->
    <div class="sidebar">
      <button class="nav-btn active" onclick="switchGame(0)">🎰 Slots</button>
      <button class="nav-btn" onclick="switchGame(1)">🃏 Blackjack</button>
      <button class="nav-btn" onclick="switchGame(2)">🎡 Roulette</button>
      <button class="nav-btn" onclick="switchGame(3)">🪙 Coin Flip</button>
      <button class="nav-btn" onclick="switchGame(4)">🚀 Crash Rocket</button>
    </div>

    <!-- Main Content -->
    <div class="content">
      <!-- Promo -->
      <div style="max-width:800px; margin:auto;">
        <input type="text" id="promoCode" placeholder="Promo Code" style="padding:12px; width:200px;">
        <button onclick="redeemPromo()">Activate</button>
        <div id="promoBanner" class="promo-banner" style="display:none;">🔥 5X LUCK ACTIVATED 🔥</div>
      </div>

      <!-- Games -->
      <div id="game0" class="game-screen">
        <h2 class="glass" style="text-align:center;">🎰 Classic Slots</h2>
        <div id="reels" style="text-align:center; font-size:4.5em; margin:30px 0;"></div>
        <div style="text-align:center;">
          <input type="number" id="betSlots" value="100" min="10">
          <button onclick="spinSlots()">SPIN</button>
        </div>
        <div id="slotsResult" style="text-align:center; margin-top:20px; font-size:1.5em; min-height:50px;"></div>
      </div>

      <div id="game1" class="game-screen" style="display:none;">
        <h2 class="glass" style="text-align:center;">🃏 Blackjack</h2>
        <p style="text-align:center; font-size:1.3em;">Player: <span id="playerHand"></span> (<span id="playerTotal"></span>)</p>
        <p style="text-align:center; font-size:1.3em;">Dealer: <span id="dealerHand"></span> (<span id="dealerTotal"></span>)</p>
        <div style="text-align:center;">
          <button onclick="dealBlackjack()">Deal</button>
          <button onclick="hit()">Hit</button>
          <button onclick="stand()">Stand</button>
        </div>
      </div>

      <div id="game2" class="game-screen" style="display:none;">
        <h2 class="glass" style="text-align:center;">🎡 Roulette</h2>
        <div style="text-align:center;">
          <p>Bet on (0-36): <input type="number" id="rouletteNumber" value="17" min="0" max="36"></p>
          <input type="number" id="betRoulette" value="50" min="10">
          <button onclick="spinRoulette()">SPIN WHEEL</button>
        </div>
        <div id="rouletteResult" style="text-align:center; margin-top:20px; font-size:1.4em;"></div>
      </div>

      <div id="game3" class="game-screen" style="display:none;">
        <h2 class="glass" style="text-align:center;">🪙 Coin Flip</h2>
        <div style="text-align:center;">
          <input type="number" id="betCoin" value="100" min="10">
          <br><br>
          <button onclick="flipCoin('heads')">HEADS</button>
          <button onclick="flipCoin('tails')">TAILS</button>
        </div>
        <div id="coinResult" style="text-align:center; margin-top:25px; font-size:1.5em;"></div>
      </div>

      <!-- Crash Rocket -->
      <div id="game4" class="game-screen" style="display:none;">
        <h2 class="glass" style="text-align:center;">🚀 CRASH ROCKET - LIVE MARKET</h2>
        
        <div class="glass">
          <div class="crash-chart-container">
            <canvas id="crashChart"></canvas>
          </div>
          <div style="text-align:center; font-size:2.2em; font-weight:bold; margin:15px 0;" id="liveMultiplier">1.00x</div>
        </div>

        <div style="text-align:center; margin-top:20px;">
          <input type="number" id="betCrash" value="100" min="10" style="padding:12px; width:180px;">
          <button id="betBtn" onclick="startCrash()">LAUNCH ROCKET</button>
          <button id="cashoutBtn" onclick="cashOut()" style="display:none; background:#00cc66;">CASH OUT</button>
        </div>
        <div id="crashResult" style="text-align:center; margin-top:20px; font-size:1.5em; min-height:60px;"></div>
      </div>
    </div>
  </div>

  <script>
    let balance = 10000;
    let currentUser = "";
    let isFiveX = false;
    let chart, crashInterval, multipliers = [], times = [];
    let currentBet = 0, currentMultiplier = 1, crashed = false;

    function saveData() {
      if (currentUser) localStorage.setItem("casino_" + currentUser, JSON.stringify({balance, isFiveX}));
    }

    function loadData(user) {
      const data = localStorage.getItem("casino_" + user);
      if (data) {
        const parsed = JSON.parse(data);
        balance = parsed.balance || 10000;
        isFiveX = parsed.isFiveX || false;
      }
      updateBalance();
    }

    function updateBalance() {
      document.getElementById('balance').textContent = balance.toLocaleString();
      document.getElementById('promoBanner').style.display = isFiveX ? 'block' : 'none';
    }

    function login() {
      const name = prompt("Enter your username:", "Player1");
      if (!name) return;
      currentUser = name;
      document.getElementById('currentUser').textContent = name;
      loadData(name);
      document.getElementById('loginScreen') ? document.getElementById('loginScreen').style.display = 'none' : null;
    }

    function logout() {
      saveData();
      location.reload();
    }

    function redeemPromo() {
      const code = document.getElementById('promoCode').value.trim().toUpperCase();
      if (code === "NEON5X" || code === "5X") {
        isFiveX = true;
        updateBalance();
        saveData();
        alert("🎉 5X LUCK ACTIVATED FOR ALL GAMES!");
      } else alert("Invalid code");
    }

    function switchGame(n) {
      document.querySelectorAll('.game-screen').forEach(g => g.style.display = 'none');
      document.getElementById(`game${n}`).style.display = 'block';
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.nav-btn')[n].classList.add('active');
    }

    // Slots
    const symbols = ['🍒','🍋','🍊','⭐','💎','7️⃣'];
    function spinSlots() {
      const bet = parseInt(document.getElementById('betSlots').value) || 100;
      if (bet > balance || bet < 10) return alert("Invalid bet");
      balance -= bet;
      updateBalance();

      const r = Array(3).fill().map(() => symbols[Math.floor(Math.random()*6)]);
      document.getElementById('reels').innerHTML = r.map(s => `<span style="margin:0 15px;">${s}</span>`).join('');

      let win = 0;
      if (r[0] === r[1] && r[1] === r[2]) win = (r[0]==='7️⃣' ? 80 : 25) * bet;
      else if (r[0] === r[1] || r[1] === r[2]) win = isFiveX ? bet*8 : bet*3;

      balance += win;
      updateBalance();
      document.getElementById('slotsResult').innerHTML = win ? `🎉 WIN $${win}!` : `No win this spin`;
      saveData();
    }

    // Crash Game with Live Chart
    function initCrashChart() {
      const ctx = document.getElementById('crashChart');
      chart = new Chart(ctx, {
        type: 'line',
        data: { labels: times, datasets: [{ label: 'Multiplier', data: multipliers, borderColor: '#00ff88', tension: 0.4 }] },
        options: { animation: false, scales: { y: { beginAtZero: true, title: { display: true, text: 'Multiplier' } } } }
      });
    }

    function startCrash() {
      const bet = parseInt(document.getElementById('betCrash').value) || 100;
      if (bet > balance) return alert("Not enough balance");
      balance -= bet; updateBalance();
      currentBet = bet;
      currentMultiplier = 1;
      multipliers = [1];
      times = [0];
      crashed = false;

      document.getElementById('betBtn').style.display = 'none';
      document.getElementById('cashoutBtn').style.display = 'inline-block';
      document.getElementById('crashResult').innerHTML = '';

      if (!chart) initCrashChart();

      let time = 0;
      crashInterval = setInterval(() => {
        time += 0.1;
        currentMultiplier += (Math.random() * 0.25) + (isFiveX ? 0.12 : 0.05);
        
        multipliers.push(currentMultiplier);
        times.push(time.toFixed(1));
        chart.update();

        document.getElementById('liveMultiplier').textContent = currentMultiplier.toFixed(2) + 'x';

        if (Math.random() < (isFiveX ? 0.009 : 0.022) && currentMultiplier > 2) crash();
      }, 80);
    }

    function cashOut() {
      if (crashed) return;
      clearInterval(crashInterval);
      let win = Math.floor(currentBet * currentMultiplier * (isFiveX ? 1.5 : 1));
      balance += win;
      updateBalance();
      document.getElementById('crashResult').innerHTML = `✅ CASHED OUT @ <strong>${currentMultiplier.toFixed(2)}x</strong> → +$${win}`;
      resetCrash();
      saveData();
    }

    function crash() {
      crashed = true;
      clearInterval(crashInterval);
      document.getElementById('liveMultiplier').innerHTML = `<span style="color:#ff4444;">💥 CRASHED @ ${currentMultiplier.toFixed(2)}x</span>`;
      document.getElementById('crashResult').innerHTML = "Rocket crashed - bet lost";
      resetCrash();
    }

    function resetCrash() {
      document.getElementById('betBtn').style.display = 'inline-block';
      document.getElementById('cashoutBtn').style.display = 'none';
      setTimeout(() => {
        multipliers = [1]; times = [0];
        if (chart) chart.update();
        document.getElementById('liveMultiplier').textContent = '1.00x';
      }, 3000);
    }

    // Other games (basic)
    function flipCoin(choice) { /* same logic as before */ 
      alert("Coin flip result coming... (5x luck improves odds)");
    }
    function spinRoulette() { alert("Roulette spin!"); }
    function dealBlackjack(){ alert("Blackjack started (demo)"); }

    // Start the casino
    window.onload = () => {
      login(); // quick login
      switchGame(0);
      // Preload reels
      document.getElementById('reels').innerHTML = '🍒 🍒 🍒';
    };
  </script>
</body>
</html>
